springdog:
  swagger-ui:
    path:/swagger-ui.html
  api-docs:
    path:/v3/api-docs

payment:
  toss:
    secret-key : ${TOSS_PAYMENT_SECRET}

jwt:
  private-key: ${PRIVATE_KEY}
  public-key: ${PUBLIC_KEY}

kafka:
  enabled: true
  bootstrap-servers: localhost:9092
  topic:
    async-orders: async-orders
  consumer:
    group-id: async-sample-group

logging:
  level:
    com.example.demo.kafka: DEBUG
    org.springframework.kafka: INFO
